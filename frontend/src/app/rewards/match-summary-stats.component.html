<section class="summary" [attr.aria-label]="'rewards.myMatches.summaryCaption' | transloco">
  <div>
    <strong>{{ loadedCount }}</strong>
    <span>{{ 'rewards.myMatches.summaryLoadedCount' | transloco }}</span>
  </div>
  <div>
    <strong>{{ victoriesCount }}</strong>
    <span>{{ 'rewards.myMatches.summaryVictories' | transloco }}</span>
  </div>
  <div>
    <strong>{{ rewardedCount }}</strong>
    <span>{{ 'rewards.myMatches.summaryRewarded' | transloco }}</span>
  </div>
</section>
<p class="caption">{{ 'rewards.myMatches.summaryCaption' | transloco }}</p>
