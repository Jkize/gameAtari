<select
  class="lang-select"
  [attr.aria-label]="'nav.selectLanguage' | transloco"
  [ngModel]="activeLang()"
  [ngModelOptions]="{ standalone: true }"
  (ngModelChange)="select($event)"
>
  @for (language of languages; track language.code) {
    <option [value]="language.code">{{ language.shortLabel }}</option>
  }
</select>
