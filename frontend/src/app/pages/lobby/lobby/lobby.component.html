<main class="lobby ui-page ui-page--compact">
  <div class="lobby-grid">
    <div class="lobby-main">
      <div>
        <div class="page-heading">
          <p class="ui-eyebrow">{{ 'lobby.eyebrow' | transloco }}</p>
          <h1>{{ 'lobby.heading' | transloco }}</h1>
        </div>
        <app-pwa-install-prompt />
        @if (currentRoom()?.type === 'private' && currentRoom()?.status !== 'in_game') {
          <app-private-room-panel
            [room]="currentRoom()!"
            [currentUserId]="auth.user()?.id ?? ''"
            [starting]="startingPrivateRoom()"
            (startRequested)="startPrivateRoom()"
            (leaveRequested)="leaveRoom()"
          />
          @if (error()) {
            <p class="room-error" role="alert">{{ error() }}</p>
          }
        } @else {
          <app-quick-play-card
            [currentRoom]="currentRoom()"
            [preparing]="preparing()"
            [preparationProgress]="preparationProgress()"
            [searching]="searching()"
            [errorMessage]="error()"
            (play)="quickPlay()"
            (cancel)="leaveRoom()"
            (retry)="quickPlay()"
            [reconnectEnabled]="reconnectEnabled"
            [canReconnect]="canReconnect()"
            (reconnect)="reconnectToMatch()"
          >
            <app-public-stats [compact]="true"></app-public-stats>
          </app-quick-play-card>

          @if (showPrivateRoomActions()) {
            <div class="private-room-actions">
              <button type="button" (click)="openRoomDialog('create')">
                <i class="ti ti-plus" aria-hidden="true"></i>
                {{ 'lobby.privateRooms.createAction' | transloco }}
              </button>
              <button type="button" (click)="openRoomDialog('join')">
                <i class="ti ti-login" aria-hidden="true"></i>
                {{ 'lobby.privateRooms.joinAction' | transloco }}
              </button>
            </div>
          }
        }
        @if (notice()) {
          <p class="notice">{{ notice() }}</p>
        }
      </div>

      <div>
        <app-reward-eligibility-notice
          [refreshKey]="accountRefresh.key()"
        ></app-reward-eligibility-notice>
      </div>
    </div>
  </div>
</main>

<app-room-access-dialog
  [open]="roomDialogMode() !== null"
  [mode]="roomDialogMode() ?? 'create'"
  [pending]="roomActionPending()"
  [errorMessage]="roomActionError()"
  (dismissed)="closeRoomDialog()"
  (submitted)="submitRoomAction($event)"
/>
