<section class="summary" [attr.aria-label]="'rewards.myMatches.summaryCaption' | transloco">
  <div class="stat stat-loaded">
    <p class="label"><i class="ti ti-database" aria-hidden="true"></i> {{ 'rewards.myMatches.summaryLoadedCount' | transloco }}</p>
    <strong>{{ loadedCount }}</strong>
  </div>
  <div class="stat stat-victories">
    <p class="label"><i class="ti ti-trophy" aria-hidden="true"></i> {{ 'rewards.myMatches.summaryVictories' | transloco }}</p>
    <strong>{{ victoriesCount }}</strong>
  </div>
  <div class="stat stat-kills">
    <p class="label"><i class="ti ti-crosshair" aria-hidden="true"></i> {{ 'rewards.myMatches.summaryKills' | transloco }}</p>
    <strong>{{ killsCount }}</strong>
  </div>
</section>
<p class="caption">{{ 'rewards.myMatches.summaryCaption' | transloco }}</p>
