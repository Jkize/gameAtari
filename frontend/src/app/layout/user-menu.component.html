<div class="user-menu">
  <button
    type="button"
    class="trigger"
    aria-haspopup="true"
    [attr.aria-expanded]="menuOpen()"
    [attr.aria-label]="'nav.userMenu' | transloco"
    (click)="toggleMenu()"
  >
    {{ auth.user()?.username ?? ('nav.guestUsername' | transloco) }}
  </button>

  @if (menuOpen()) {
    <div class="dropdown" role="menu">
      <button type="button" role="menuitem" (click)="openAccount()">{{ 'nav.account' | transloco }}</button>
      <div class="theme-setting">
        <button
          type="button"
          class="theme-toggle"
          role="switch"
          [attr.aria-checked]="theme.current() === 'dark'"
          [attr.aria-label]="(theme.current() === 'dark' ? 'settings.switchToLight' : 'settings.switchToDark') | transloco"
          (click)="toggleTheme()"
        >
          <i class="ti ti-sun sun" aria-hidden="true"></i>
          <i class="ti ti-moon moon" aria-hidden="true"></i>
          <span class="toggle-thumb" aria-hidden="true"></span>
        </button>
      </div>
      <button type="button" role="menuitem" (click)="logout()">{{ 'nav.signOut' | transloco }}</button>
    </div>
  }
</div>
