@if (mobileNavState.open()) {
  <div
    id="mobile-nav-panel"
    class="panel"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'nav.userMenu' | transloco"
  >
    <div class="panel-header">
      <span class="panel-title">{{ 'settings.menu' | transloco }}</span>
      <button
        #closeButton
        type="button"
        class="close"
        [attr.aria-label]="'nav.closeMenu' | transloco"
        (click)="close()"
      >
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>

    <nav class="links" aria-label="Main navigation">
      @for (tab of nav.visibleTabs(); track tab.path) {
        <a [routerLink]="tab.path" routerLinkActive="active" (click)="close()">{{ tab.labelKey | transloco }}</a>
      }
      <button type="button" class="action-link" (click)="openAccount()">{{ 'nav.account' | transloco }}</button>
      <a routerLink="/tutorial" routerLinkActive="active" (click)="close()">{{ 'nav.howToPlay' | transloco }}</a>
    </nav>

    <div class="theme-row">
      <span>{{
        (theme.current() === 'dark' ? 'settings.switchToLight' : 'settings.switchToDark') | transloco
      }}</span>
      <button
        type="button"
        class="theme-toggle"
        role="switch"
        [attr.aria-checked]="theme.current() === 'dark'"
        [attr.aria-label]="(theme.current() === 'dark' ? 'settings.switchToLight' : 'settings.switchToDark') | transloco"
        (click)="toggleTheme()"
      >
        <i class="ti ti-sun sun" aria-hidden="true"></i>
        <i class="ti ti-moon moon" aria-hidden="true"></i>
        <span class="toggle-thumb" aria-hidden="true"></span>
      </button>
    </div>

    <app-lang-switcher />

    <button type="button" class="signout" (click)="logout()">{{ 'nav.signOut' | transloco }}</button>
  </div>
}
