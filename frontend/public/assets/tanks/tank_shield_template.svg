<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="shieldClip">
      <circle cx="256" cy="256" r="219"/>
    </clipPath>

    <radialGradient id="domeFill" cx="48%" cy="42%" r="62%">
      <stop offset="0%" stop-color="var(--shield-hot)" stop-opacity="0.12"/>
      <stop offset="52%" stop-color="var(--shield-color)" stop-opacity="0.08"/>
      <stop offset="78%" stop-color="var(--shield-color)" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="var(--shield-deep)" stop-opacity="0.05"/>
    </radialGradient>

    <radialGradient id="rimFill" cx="50%" cy="50%" r="50%">
      <stop offset="72%" stop-color="var(--shield-color)" stop-opacity="0"/>
      <stop offset="84%" stop-color="var(--shield-color)" stop-opacity="0.38"/>
      <stop offset="94%" stop-color="var(--shield-hot)" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="var(--shield-deep)" stop-opacity="0.28"/>
    </radialGradient>

    <linearGradient id="domeSweep" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="var(--shield-hot)" stop-opacity="0.34"/>
      <stop offset="42%" stop-color="var(--shield-color)" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="var(--shield-deep)" stop-opacity="0"/>
    </linearGradient>

    <filter id="rimGlow" x="-22%" y="-22%" width="144%" height="144%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="var(--shield-color)" flood-opacity="0.92"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="var(--shield-color)" flood-opacity="0.42"/>
    </filter>

    <style>
      :root {
        --tank-color: #3ebcff;
        --shield-color: var(--tank-color);
        --shield-hot: color-mix(in srgb, var(--shield-color), white 34%);
        --shield-soft: color-mix(in srgb, var(--shield-color), white 18%);
        --shield-deep: color-mix(in srgb, var(--shield-color), black 58%);
      }
      .rim { fill:none; stroke:var(--shield-hot); stroke-linecap:round; }
      .hex { fill:var(--shield-color); fill-opacity:.025; stroke:var(--shield-hot); stroke-opacity:.78; stroke-width:2.8; stroke-linejoin:round; }
      .hex-weak { fill:none; stroke:var(--shield-soft); stroke-opacity:.45; stroke-width:1.8; stroke-linejoin:round; }
      .crackle { fill:none; stroke:var(--shield-hot); stroke-opacity:.58; stroke-width:2.8; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <circle cx="256" cy="256" r="223" fill="url(#domeFill)"/>
  <circle cx="256" cy="256" r="223" fill="url(#rimFill)" filter="url(#rimGlow)"/>

  <g clip-path="url(#shieldClip)">
    <ellipse cx="256" cy="230" rx="196" ry="148" fill="url(#domeSweep)" opacity="0.28"/>

    <!-- inner panels -->
    <g opacity="0.92">
      <polygon class="hex" points="190,106 221,124 221,160 190,178 159,160 159,124"/>
      <polygon class="hex" points="256,106 287,124 287,160 256,178 225,160 225,124"/>
      <polygon class="hex" points="322,106 353,124 353,160 322,178 291,160 291,124"/>

      <polygon class="hex" points="157,163 188,181 188,217 157,235 126,217 126,181"/>
      <polygon class="hex" points="223,163 254,181 254,217 223,235 192,217 192,181"/>
      <polygon class="hex" points="289,163 320,181 320,217 289,235 258,217 258,181"/>
      <polygon class="hex" points="355,163 386,181 386,217 355,235 324,217 324,181"/>

      <polygon class="hex" points="124,220 155,238 155,274 124,292 93,274 93,238"/>
      <polygon class="hex" points="190,220 221,238 221,274 190,292 159,274 159,238"/>
      <polygon class="hex" points="256,220 287,238 287,274 256,292 225,274 225,238"/>
      <polygon class="hex" points="322,220 353,238 353,274 322,292 291,274 291,238"/>
      <polygon class="hex" points="388,220 419,238 419,274 388,292 357,274 357,238"/>

      <polygon class="hex" points="157,277 188,295 188,331 157,349 126,331 126,295"/>
      <polygon class="hex" points="223,277 254,295 254,331 223,349 192,331 192,295"/>
      <polygon class="hex" points="289,277 320,295 320,331 289,349 258,331 258,295"/>
      <polygon class="hex" points="355,277 386,295 386,331 355,349 324,331 324,295"/>

      <polygon class="hex" points="190,334 221,352 221,388 190,406 159,388 159,352"/>
      <polygon class="hex" points="256,334 287,352 287,388 256,406 225,388 225,352"/>
      <polygon class="hex" points="322,334 353,352 353,388 322,406 291,388 291,352"/>
    </g>

    <!-- edge panels (clipped by shield circle) -->
    <g>
      <polygon class="hex-weak" points="157,49 188,67 188,103 157,121 126,103 126,67"/>
      <polygon class="hex-weak" points="223,49 254,67 254,103 223,121 192,103 192,67"/>
      <polygon class="hex-weak" points="289,49 320,67 320,103 289,121 258,103 258,67"/>
      <polygon class="hex-weak" points="355,49 386,67 386,103 355,121 324,103 324,67"/>

      <polygon class="hex-weak" points="124,106 155,124 155,160 124,178 93,160 93,124"/>
      <polygon class="hex-weak" points="388,106 419,124 419,160 388,178 357,160 357,124"/>

      <polygon class="hex-weak" points="91,163 122,181 122,217 91,235 60,217 60,181"/>
      <polygon class="hex-weak" points="421,163 452,181 452,217 421,235 390,217 390,181"/>

      <polygon class="hex-weak" points="58,220 89,238 89,274 58,292 27,274 27,238"/>
      <polygon class="hex-weak" points="454,220 485,238 485,274 454,292 423,274 423,238"/>

      <polygon class="hex-weak" points="91,277 122,295 122,331 91,349 60,331 60,295"/>
      <polygon class="hex-weak" points="421,277 452,295 452,331 421,349 390,331 390,295"/>

      <polygon class="hex-weak" points="124,334 155,352 155,388 124,406 93,388 93,352"/>
      <polygon class="hex-weak" points="388,334 419,352 419,388 388,406 357,388 357,352"/>

      <polygon class="hex-weak" points="157,391 188,409 188,445 157,463 126,445 126,409"/>
      <polygon class="hex-weak" points="223,391 254,409 254,445 223,463 192,445 192,409"/>
      <polygon class="hex-weak" points="289,391 320,409 320,445 289,463 258,445 258,409"/>
      <polygon class="hex-weak" points="355,391 386,409 386,445 355,463 324,445 324,409"/>
    </g>

    <path class="crackle" d="M126 195 l18 -10 15 9 20 -13"/>
    <path class="crackle" d="M320 172 l22 -12 24 14 18 -10"/>
    <path class="crackle" d="M192 295 l20 -11 17 10 20 -15"/>
    <path class="crackle" d="M330 320 l16 -10 15 9 28 -15"/>
    <path class="crackle" d="M210 370 l22 -13 20 10"/>
  </g>

  <circle cx="256" cy="256" r="205" class="rim" stroke-width="2.4" stroke-opacity="0.2"/>
  <circle cx="256" cy="256" r="220" class="rim" stroke-width="6.4" stroke-opacity="0.72" filter="url(#rimGlow)"/>
  <circle cx="256" cy="256" r="230" class="rim" stroke-width="2" stroke-opacity="0.4"/>

  <path d="M91 162 C123 105 183 70 256 70 C330 70 390 106 421 164" class="rim" stroke-width="5.2" stroke-opacity="0.36"/>
  <path d="M82 331 C118 403 185 442 256 442 C328 442 395 402 430 329" class="rim" stroke-width="4.8" stroke-opacity="0.28"/>
</svg>
