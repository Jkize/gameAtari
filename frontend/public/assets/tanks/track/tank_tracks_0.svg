<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      :root {
        --track-tread-bright: #9298a3;
        --track-tread-mid: #5a5f68;
        --track-tread-dark: #30343b;
        --track-tread-shadow: #1b1517;
        --track-tread-highlight: #e9e1e4;
        --track-base-bright: #2c2c30;
        --track-base-mid: #17181b;
        --track-base-dark: #090a0c;
        --track-base-outline: #050608;
      }
    </style>
    <linearGradient id="trackBase" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="var(--track-base-bright)"/>
      <stop offset=".45" stop-color="var(--track-base-mid)"/>
      <stop offset="1" stop-color="var(--track-base-dark)"/>
    </linearGradient>
    <linearGradient id="plateLeft" x1="0" x2="1" y1="0" y2="0" gradientTransform="rotate(180 .5 .5)">
      <stop offset="0" stop-color="var(--track-tread-bright)"/>
      <stop offset=".32" stop-color="var(--track-tread-mid)"/>
      <stop offset=".72" stop-color="var(--track-tread-dark)"/>
      <stop offset="1" stop-color="var(--track-tread-shadow)"/>
    </linearGradient>
    <linearGradient id="plateRight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="var(--track-tread-bright)"/>
      <stop offset=".32" stop-color="var(--track-tread-mid)"/>
      <stop offset=".72" stop-color="var(--track-tread-dark)"/>
      <stop offset="1" stop-color="var(--track-tread-shadow)"/>
    </linearGradient>
    <clipPath id="left"><rect x="74" y="62" width="78" height="388" rx="22"/></clipPath>
    <clipPath id="right"><rect x="360" y="62" width="78" height="388" rx="22"/></clipPath>
    <pattern id="leftPlate" x="84" y="74" width="58" height="43" patternUnits="userSpaceOnUse">
      <rect width="58" height="35" rx="6" fill="url(#plateLeft)"/>
      <path d="M7 3h44" stroke="var(--track-tread-highlight)" stroke-width="2" stroke-linecap="round" opacity=".52"/>
    </pattern>
    <pattern id="rightPlate" x="370" y="74" width="58" height="43" patternUnits="userSpaceOnUse">
      <rect width="58" height="35" rx="6" fill="url(#plateRight)"/>
      <path d="M7 3h44" stroke="var(--track-tread-highlight)" stroke-width="2" stroke-linecap="round" opacity=".52"/>
    </pattern>
  </defs>
  <rect x="74" y="62" width="78" height="388" rx="22" fill="url(#trackBase)" stroke="var(--track-base-outline)" stroke-width="4.5"/>
  <rect x="360" y="62" width="78" height="388" rx="22" fill="url(#trackBase)" stroke="var(--track-base-outline)" stroke-width="4.5"/>
  <rect x="84" y="62" width="58" height="388" fill="url(#leftPlate)" clip-path="url(#left)"/>
  <rect x="370" y="62" width="58" height="388" fill="url(#rightPlate)" clip-path="url(#right)"/>
</svg>
