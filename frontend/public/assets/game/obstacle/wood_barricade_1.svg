    <circle cx="26" cy="37" r="4.3" fill="url(#metalBolt)"/><circle cx="26" cy="37" r="2" fill="#4b5158"/>
    <circle cx="102" cy="37" r="4.3" fill="url(#metalBolt)"/><circle cx="102" cy="37" r="2" fill="#4b5158"/>

    <circle cx="26" cy="63" r="4.3" fill="url(#metalBolt)"/><circle cx="26" cy="63" r="2" fill="#4b5158"/>
    <circle cx="102" cy="63" r="4.3" fill="url(#metalBolt)"/><circle cx="102" cy="63" r="2" fill="#4b5158"/>

    <circle cx="26" cy="89" r="4.3" fill="url(#metalBolt)"/><circle cx="26" cy="89" r="2" fill="#4b5158"/>
    <circle cx="102" cy="89" r="4.3" fill="url(#metalBolt)"/><circle cx="102" cy="89" r="2" fill="#4b5158"/>
  </g>

