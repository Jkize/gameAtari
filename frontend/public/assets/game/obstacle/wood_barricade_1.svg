<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256">
  <defs>
    <linearGradient id="frameWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9c6437"/>
      <stop offset="0.5" stop-color="#6f4324"/>
      <stop offset="1" stop-color="#3f2414"/>
    </linearGradient>

    <linearGradient id="plankLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d79a5c"/>
      <stop offset="0.5" stop-color="#bf7d45"/>
      <stop offset="1" stop-color="#9c6235"/>
    </linearGradient>

    <linearGradient id="plankMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9884f"/>
      <stop offset="0.55" stop-color="#ad6d3d"/>
      <stop offset="1" stop-color="#8a5430"/>
    </linearGradient>

    <linearGradient id="plankDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a15e36"/>
      <stop offset="0.5" stop-color="#7c4529"/>
      <stop offset="1" stop-color="#5b311f"/>
    </linearGradient>

    <linearGradient id="metalBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#aeb4bb"/>
      <stop offset="0.45" stop-color="#666d75"/>
      <stop offset="1" stop-color="#2b2f35"/>
    </linearGradient>
  </defs>

  <!-- OUTER FRAME -->
  <rect x="4" y="4" width="120" height="120" rx="10" ry="10" fill="url(#frameWood)"/>

  <!-- INNER BACK -->
  <rect x="12" y="12" width="104" height="104" rx="6" ry="6" fill="#4f2d1a"/>

  <!-- SIDE POSTS -->
  <rect x="12" y="12" width="12" height="104" rx="4" fill="#b57a45"/>
  <rect x="104" y="12" width="12" height="104" rx="4" fill="#b57a45"/>

  <!-- TOP / BOTTOM BARS -->
  <rect x="12" y="12" width="104" height="10" rx="4" fill="#8f5a31"/>
  <rect x="12" y="106" width="104" height="10" rx="4" fill="#8f5a31"/>

  <!-- PLANK 1 -->
  <path d="M24 24 L102 24 Q108 24 108 29 L108 43 Q108 48 102 48 L37 48 L30 52 L24 48 Q20 47 20 43 L20 29 Q20 24 24 24Z" fill="url(#plankLight)"/>

  <!-- PLANK 2 -->
  <path d="M24 50 L102 50 Q108 50 108 55 L108 69 Q108 74 102 74 L74 74 L67 78 L60 74 L24 74 Q20 74 20 69 L20 55 Q20 50 24 50Z" fill="url(#plankDark)"/>

  <!-- PLANK 3 -->
  <path d="M24 76 L102 76 Q108 76 108 81 L108 95 Q108 100 102 100 L43 100 L35 104 L28 100 L24 100 Q20 100 20 95 L20 81 Q20 76 24 76Z" fill="url(#plankMid)"/>

  <!-- BOTTOM PLANK -->
  <path d="M20 104 L108 104 Q112 104 112 108 L112 114 Q112 118 108 118 L20 118 Q16 118 16 114 L16 108 Q16 104 20 104Z" fill="#c88b4f"/>

