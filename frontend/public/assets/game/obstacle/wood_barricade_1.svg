  <path d="M63 68 L72 64 L76 59" fill="none" stroke="#4f2c1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M34 98 L45 94 L51 96" fill="none" stroke="#5a3320" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" opacity="0.58"/>

