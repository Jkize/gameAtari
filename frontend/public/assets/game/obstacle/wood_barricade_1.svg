  <path d="M28 31 C40 29, 54 33, 70 30 C83 28, 95 31, 102 30" fill="none" stroke="#9b6338" stroke-width="1.7" opacity="0.45" stroke-linecap="round"/>
  <path d="M26 39 C42 38, 58 40, 78 39 C89 38, 98 40, 103 39" fill="none" stroke="#8d5932" stroke-width="1.6" opacity="0.38" stroke-linecap="round"/>

  <path d="M26 57 C40 55, 55 58, 73 57 C88 56, 96 58, 104 57" fill="none" stroke="#6d3d24" stroke-width="1.8" opacity="0.4" stroke-linecap="round"/>
  <path d="M28 65 C38 64, 48 67, 64 65 C82 63, 95 66, 103 64" fill="none" stroke="#5f3520" stroke-width="1.6" opacity="0.35" stroke-linecap="round"/>

  <path d="M26 83 C42 82, 58 84, 73 83 C87 82, 96 84, 103 83" fill="none" stroke="#8b5731" stroke-width="1.7" opacity="0.38" stroke-linecap="round"/>
  <path d="M29 91 C44 90, 59 93, 77 91 C90 89, 99 92, 103 91" fill="none" stroke="#7b4b2b" stroke-width="1.6" opacity="0.3" stroke-linecap="round"/>

