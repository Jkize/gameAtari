  <path d="M24 49 L104 49" stroke="#3d2214" stroke-width="2.2" opacity="0.45"/>
  <path d="M24 75 L104 75" stroke="#3d2214" stroke-width="2.2" opacity="0.45"/>
  <path d="M16 104 L112 104" stroke="#3d2214" stroke-width="2.2" opacity="0.4"/>

