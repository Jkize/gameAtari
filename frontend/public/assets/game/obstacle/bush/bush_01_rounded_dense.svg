      <circle cx="5.8" cy="20" r="5.4" fill="url(#leafLight)"/>
      <circle cx="5.3" cy="27" r="5.1" fill="url(#leafMid)"/>
      <circle cx="5.7" cy="34" r="5.5" fill="url(#leafLight)"/>
      <circle cx="5.4" cy="41" r="5.2" fill="url(#leafMid)"/>
      <circle cx="5.8" cy="48" r="5.4" fill="url(#leafDark)"/>

      <!-- Right border -->
      <circle cx="58.5" cy="13" r="5.2" fill="url(#leafMid)"/>
      <circle cx="58.2" cy="20" r="5.4" fill="url(#leafLight)"/>
