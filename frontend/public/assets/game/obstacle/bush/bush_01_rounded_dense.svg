<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <defs>
    <!-- MAIN COLORS - change these first if you want -->
    <linearGradient id="leafLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fc447"/>
      <stop offset="0.6" stop-color="#338f32"/>
      <stop offset="1" stop-color="#1d6428"/>
    </linearGradient>

    <linearGradient id="leafMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43a93d"/>
      <stop offset="1" stop-color="#176120"/>
    </linearGradient>

    <linearGradient id="leafDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#236f2c"/>
      <stop offset="1" stop-color="#0f3d19"/>
    </linearGradient>

    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.35" flood-color="#071b0b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Base body -->
    <rect x="5" y="5" width="54" height="54" rx="2.4" fill="#123f1b"/>

    <!-- Outer rounded border -->
    <g opacity="1">
      <!-- Top border -->
      <circle cx="7" cy="7" r="5" fill="url(#leafDark)"/>
      <circle cx="13" cy="5.5" r="5.2" fill="url(#leafMid)"/>
      <circle cx="20" cy="5.8" r="5.4" fill="url(#leafLight)"/>
      <circle cx="27" cy="5.3" r="5.1" fill="url(#leafMid)"/>
      <circle cx="34" cy="5.7" r="5.5" fill="url(#leafLight)"/>
      <circle cx="41" cy="5.4" r="5.2" fill="url(#leafMid)"/>
      <circle cx="48" cy="5.8" r="5.4" fill="url(#leafLight)"/>
      <circle cx="57" cy="7" r="5" fill="url(#leafDark)"/>

      <!-- Bottom border -->
      <circle cx="7" cy="57" r="5" fill="url(#leafDark)"/>
      <circle cx="13" cy="58.5" r="5.2" fill="url(#leafMid)"/>
      <circle cx="20" cy="58.2" r="5.4" fill="url(#leafLight)"/>
      <circle cx="27" cy="58.7" r="5.1" fill="url(#leafMid)"/>
      <circle cx="34" cy="58.3" r="5.5" fill="url(#leafLight)"/>
      <circle cx="41" cy="58.6" r="5.2" fill="url(#leafMid)"/>
      <circle cx="48" cy="58.2" r="5.4" fill="url(#leafLight)"/>
      <circle cx="57" cy="57" r="5" fill="url(#leafDark)"/>

      <!-- Left border -->
