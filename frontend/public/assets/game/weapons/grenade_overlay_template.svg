<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 712" width="512" height="712">
  <defs>
    <radialGradient id="launcherHead" cx="42%" cy="28%" r="72%">
      <stop offset="0%" stop-color="var(--tank-highlight)"/>
      <stop offset="42%" stop-color="var(--tank-color)"/>
      <stop offset="100%" stop-color="var(--tank-deep-shadow)"/>
    </radialGradient>
    <linearGradient id="tube" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="var(--tank-highlight)"/>
      <stop offset="52%" stop-color="var(--tank-shadow)"/>
      <stop offset="100%" stop-color="var(--tank-deep-shadow)"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5d626b"/>
      <stop offset="55%" stop-color="#2a2e36"/>
      <stop offset="100%" stop-color="#090b0e"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="11" stdDeviation="8" flood-color="#000" flood-opacity=".36"/>
    </filter>
    <style>
      :root {
        --tank-color: #e54637;
        --tank-highlight: color-mix(in srgb, var(--tank-color), white 38%);
        --tank-soft-highlight: color-mix(in srgb, var(--tank-color), white 64%);
        --tank-shadow: color-mix(in srgb, var(--tank-color), black 28%);
        --tank-deep-shadow: color-mix(in srgb, var(--tank-color), black 58%);
        --tank-outline: color-mix(in srgb, var(--tank-color), black 86%);
      }
      .line { stroke:var(--tank-outline); stroke-width:4; stroke-linejoin:round; }
      .fine { stroke:var(--tank-outline); stroke-width:2.2; stroke-linejoin:round; }
      .shine { stroke:var(--tank-soft-highlight); stroke-opacity:.48; stroke-width:3.4; stroke-linecap:round; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <g transform="translate(256 330)">
      <path d="M-69 -4 H69 L94 42 L82 102 H-82 L-94 42 Z" fill="url(#launcherHead)" class="line"/>
      <ellipse cx="0" cy="45" rx="47" ry="31" fill="#20242c" class="fine"/>
      <circle cx="0" cy="45" r="21" fill="#080a0d" class="fine"/>

      <rect x="-50" y="88" width="100" height="120" rx="30" fill="url(#tube)" class="line"/>
      <rect x="-62" y="190" width="124" height="48" rx="18" fill="url(#steel)" class="line"/>
      <rect x="-43" y="222" width="86" height="76" rx="24" fill="url(#tube)" class="line"/>
      <ellipse cx="0" cy="294" rx="38" ry="25" fill="#090b0f" class="line"/>
      <ellipse cx="0" cy="294" rx="20" ry="12" fill="#010203"/>

      <path d="M-30 112 v72" class="shine"/>
      <path d="M-24 234 v44" class="shine"/>
      <path d="M-61 31 h122" stroke="var(--tank-soft-highlight)" stroke-opacity=".45" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>
</svg>
