<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 712" width="512" height="712">
  <defs>
    <linearGradient id="weaponRed" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="var(--tank-highlight)"/>
      <stop offset="45%" stop-color="var(--tank-color)"/>
      <stop offset="100%" stop-color="var(--tank-deep-shadow)"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4d5058"/>
      <stop offset="55%" stop-color="#252932"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <style>
      :root {
        --tank-color: #e54637;
        --tank-highlight: color-mix(in srgb, var(--tank-color), white 38%);
        --tank-soft-highlight: color-mix(in srgb, var(--tank-color), white 64%);
        --tank-shadow: color-mix(in srgb, var(--tank-color), black 28%);
        --tank-deep-shadow: color-mix(in srgb, var(--tank-color), black 58%);
        --tank-outline: color-mix(in srgb, var(--tank-color), black 86%);
      }
      .line { stroke:var(--tank-outline); stroke-width:4; stroke-linejoin:round; }
      .fine { stroke:var(--tank-outline); stroke-width:2.2; stroke-linejoin:round; }
      .shine { stroke:var(--tank-soft-highlight); stroke-opacity:.5; stroke-width:3.4; stroke-linecap:round; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <g transform="translate(256 330)">
      <rect x="-88" y="6" width="52" height="64" rx="17" fill="url(#weaponRed)" class="line"/>
      <rect x="36" y="6" width="52" height="64" rx="17" fill="url(#weaponRed)" class="line"/>

      <rect x="-82" y="58" width="40" height="190" rx="13" fill="url(#weaponRed)" class="line"/>
      <rect x="42" y="58" width="40" height="190" rx="13" fill="url(#weaponRed)" class="line"/>

      <rect x="-88" y="231" width="52" height="34" rx="12" fill="url(#steel)" class="line"/>
      <rect x="36" y="231" width="52" height="34" rx="12" fill="url(#steel)" class="line"/>
      <circle cx="-62" cy="249" r="11" fill="#080a0d" class="fine"/>
      <circle cx="62" cy="249" r="11" fill="#080a0d" class="fine"/>

      <path d="M-72 80 v130" class="shine"/>
      <path d="M52 80 v130" class="shine"/>
      <path d="M-48 34 h24 q24 0 32 26" fill="none" stroke="url(#steel)" stroke-width="9" stroke-linecap="round"/>
      <path d="M48 34 h-24 q-24 0 -32 26" fill="none" stroke="url(#steel)" stroke-width="9" stroke-linecap="round"/>
    </g>
  </g>
</svg>
