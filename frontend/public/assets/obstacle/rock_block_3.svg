<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256">
  <defs>
    <!-- COLORS -->
    <linearGradient id="baseDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d848d"/>
      <stop offset="0.45" stop-color="#4e555e"/>
      <stop offset="1" stop-color="#23272d"/>
    </linearGradient>

    <linearGradient id="topDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5adb5"/>
      <stop offset="1" stop-color="#59616a"/>
    </linearGradient>

    <linearGradient id="sideDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4148"/>
      <stop offset="1" stop-color="#191c21"/>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>

    <!-- Heavier destruction -->
    <mask id="damageMask2">
      <rect width="128" height="128" fill="white"/>

      <!-- large missing edge chunks -->
      <circle cx="15" cy="25" r="11" fill="black"/>
      <circle cx="108" cy="22" r="10" fill="black"/>
      <circle cx="114" cy="101" r="12" fill="black"/>
      <circle cx="20" cy="111" r="10" fill="black"/>

      <!-- large impact holes -->
      <circle cx="37" cy="51" r="8" fill="black"/>
      <ellipse cx="77" cy="65" rx="9" ry="8" fill="black"/>
      <circle cx="54" cy="94" r="8" fill="black"/>
      <circle cx="90" cy="86" r="7" fill="black"/>

      <!-- extra broken transparent cuts -->
      <path d="M27 83 L39 79 L43 90 L30 95 Z" fill="black"/>
      <path d="M82 79 L96 84 L92 98 L79 92 Z" fill="black"/>
      <path d="M60 32 L72 36 L68 47 L57 43 Z" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#damageMask2)">
    <!-- MAIN ROCK -->
    <path
      d="M5 14
         C15 4, 34 2, 52 6
         C70 2, 101 6, 114 16
         C126 26, 128 48, 122 68
         C126 88, 114 112, 93 119
         C70 126, 38 124, 19 119
         C5 115, 0 96, 4 75
         C0 55, 1 26, 5 14Z"
      fill="url(#baseDark)"
    />

    <!-- TOP FACE -->
    <path
      d="M11 16
         C25 8, 43 8, 55 12
         C74 6, 99 9, 111 18
         C121 27, 122 45, 116 60
         C102 72, 76 78, 55 73
         C37 77, 16 71, 7 59
         C2 44, 3 27, 11 16Z"
      fill="url(#topDark)"
      filter="url(#noise)"
      opacity="0.95"
    />

    <!-- LOWER / SIDE SHADE -->
    <path
      d="M5 67
         C22 78, 42 83, 56 76
         C78 82, 101 77, 118 62
         C124 76, 122 96, 110 108
         C94 123, 58 126, 25 119
         C8 115, 0 99, 3 80
         C3 75, 4 70, 5 67Z"
      fill="url(#sideDark)"
      opacity="0.78"
    />

    <!-- LIGHT VEINS -->
    <path d="M24 30 L43 49 L34 65 L53 85" fill="none" stroke="#d7dde3" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
    <path d="M72 28 L92 41 L109 61" fill="none" stroke="#cfd5db" stroke-width="2.7" stroke-linecap="round" opacity="0.32"/>
    <path d="M21 61 L41 56 L59 65" fill="none" stroke="#e0e5ea" stroke-width="2.2" stroke-linecap="round" opacity="0.24"/>

    <!-- ORANGE / RUST ACCENTS -->
    <path d="M82 54 C89 48, 101 50, 106 57 C101 66, 91 70, 82 66 C78 63, 78 58, 82 54Z" fill="#b56f34" opacity="0.52"/>
    <path d="M43 92 C50 87, 60 89, 65 96 C60 104, 49 105, 43 100 C39 97, 40 94, 43 92Z" fill="#8d5829" opacity="0.38"/>

    <!-- HEAVY CRACKS -->
    <path d="M35 45 L54 39 L72 48" fill="none" stroke="#111418" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M74 75 L86 84 L81 103" fill="none" stroke="#111418" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M16 95 L35 86 L45 98" fill="none" stroke="#111418" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

    <path d="M30 52 L45 59 L41 73 L52 84" fill="none" stroke="#0d1013" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M69 60 L85 69 L79 81 L92 92" fill="none" stroke="#0d1013" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
    <path d="M49 87 L61 96 L56 110" fill="none" stroke="#0d1013" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>
    <path d="M57 28 L71 35 L67 48" fill="none" stroke="#0d1013" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>

    <!-- IMPACT RINGS -->
    <circle cx="37" cy="51" r="10" fill="none" stroke="#181c21" stroke-width="2.3" opacity="0.5"/>
    <ellipse cx="77" cy="65" rx="11" ry="10" fill="none" stroke="#181c21" stroke-width="2.3" opacity="0.5"/>
    <circle cx="54" cy="94" r="10" fill="none" stroke="#181c21" stroke-width="2.3" opacity="0.48"/>
    <circle cx="90" cy="86" r="9" fill="none" stroke="#181c21" stroke-width="2.1" opacity="0.45"/>

    <!-- SMALL TEXTURE DOTS -->
    <circle cx="27" cy="47" r="2.8" fill="#2d3137" opacity="0.32"/>
    <circle cx="64" cy="25" r="2.3" fill="#d7dde3" opacity="0.22"/>
    <circle cx="95" cy="78" r="3" fill="#16191d" opacity="0.33"/>
    <circle cx="56" cy="100" r="3.2" fill="#8b939b" opacity="0.22"/>

    <!-- EDGE HIGHLIGHT -->
    <path
      d="M10 16
         C24 5, 45 7, 56 11
         C74 5, 99 8, 113 17"
      fill="none"
      stroke="#eef3f7"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.18"
    />
  </g>
</svg>