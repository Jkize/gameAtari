<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256">
  <defs>
    <linearGradient id="baseDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d848d"/>
      <stop offset="0.45" stop-color="#4e555e"/>
      <stop offset="1" stop-color="#23272d"/>
    </linearGradient>

    <linearGradient id="topDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5adb5"/>
      <stop offset="1" stop-color="#59616a"/>
    </linearGradient>

    <linearGradient id="sideDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4148"/>
      <stop offset="1" stop-color="#191c21"/>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>

    <mask id="damageMask2">
      <rect width="128" height="128" fill="white"/>

      <!-- stronger jagged transparent destruction -->
      <path d="M2 15 L16 3 L34 4 L24 18 L34 31 L14 34 L3 27 Z" fill="black"/>
      <path d="M96 5 L119 10 L126 33 L110 29 L100 43 L94 22 Z" fill="black"/>
      <path d="M112 59 L126 51 L126 78 L115 73 L106 84 L102 68 Z" fill="black"/>
      <path d="M104 91 L126 83 L126 114 L110 124 L96 107 Z" fill="black"/>
      <path d="M14 103 L31 95 L47 110 L31 126 L8 119 Z" fill="black"/>

      <!-- heavy internal missing chunks -->
      <path d="M33 47 L51 38 L66 51 L53 63 L36 59 Z" fill="black"/>
      <path d="M70 61 L93 56 L104 72 L86 84 L68 76 Z" fill="black"/>
      <path d="M45 86 L65 79 L82 96 L62 113 L43 101 Z" fill="black"/>
      <path d="M55 24 L75 28 L70 45 L52 40 Z" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#damageMask2)">
    <path
      d="M5 14
         C15 4, 34 2, 52 6
         C70 2, 101 6, 114 16
         C126 26, 128 48, 122 68
         C126 88, 114 112, 93 119
         C70 126, 38 124, 19 119
         C5 115, 0 96, 4 75
         C0 55, 1 26, 5 14Z"
      fill="url(#baseDark)"
    />

    <path
      d="M11 16
         C25 8, 43 8, 55 12
         C74 6, 99 9, 111 18
         C121 27, 122 45, 116 60
         C102 72, 76 78, 55 73
         C37 77, 16 71, 7 59
         C2 44, 3 27, 11 16Z"
      fill="url(#topDark)"
      filter="url(#noise)"
      opacity="0.95"
    />

    <path
      d="M5 67
         C22 78, 42 83, 56 76
         C78 82, 101 77, 118 62
         C124 76, 122 96, 110 108
         C94 123, 58 126, 25 119
         C8 115, 0 99, 3 80
         C3 75, 4 70, 5 67Z"
      fill="url(#sideDark)"
      opacity="0.78"
    />

    <!-- dark exposed broken faces -->
    <path d="M32 47 L51 37 L67 51 L53 64 L35 60 Z" fill="#0c0f12" opacity="0.72"/>
    <path d="M69 61 L93 55 L105 72 L86 85 L67 77 Z" fill="#0b0e11" opacity="0.75"/>
    <path d="M44 86 L65 78 L83 96 L62 114 L42 102 Z" fill="#0c0f12" opacity="0.72"/>
    <path d="M54 24 L75 28 L70 46 L51 41 Z" fill="#111418" opacity="0.68"/>

    <!-- fewer lights because it is very damaged -->
    <path d="M24 30 L43 49 L34 65 L53 85" fill="none" stroke="#d7dde3" stroke-width="3" stroke-linecap="round" opacity="0.32"/>
    <path d="M72 28 L92 41 L109 61" fill="none" stroke="#cfd5db" stroke-width="2.7" stroke-linecap="round" opacity="0.24"/>
    <path d="M21 61 L41 56 L59 65" fill="none" stroke="#e0e5ea" stroke-width="2.2" stroke-linecap="round" opacity="0.18"/>

    <path d="M82 54 C89 48, 101 50, 106 57 C101 66, 91 70, 82 66 C78 63, 78 58, 82 54Z" fill="#b56f34" opacity="0.42"/>
    <path d="M43 92 C50 87, 60 89, 65 96 C60 104, 49 105, 43 100 C39 97, 40 94, 43 92Z" fill="#8d5829" opacity="0.32"/>

    <!-- heavy cracks -->
    <path d="M35 45 L54 39 L72 48" fill="none" stroke="#080a0c" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M74 75 L86 84 L81 103" fill="none" stroke="#080a0c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M16 95 L35 86 L45 98" fill="none" stroke="#080a0c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <path d="M30 51 L47 60 L42 75 L54 89" fill="none" stroke="#050708" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
    <path d="M67 59 L86 70 L78 86 L94 99" fill="none" stroke="#050708" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.94"/>
    <path d="M47 86 L63 98 L56 116" fill="none" stroke="#050708" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M55 25 L72 35 L68 50" fill="none" stroke="#050708" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>

    <!-- angular texture -->
    <path d="M26 47 L32 44 L36 50 L29 54 Z" fill="#2d3137" opacity="0.28"/>
    <path d="M92 78 L100 75 L103 83 L96 87 Z" fill="#16191d" opacity="0.3"/>
    <path d="M55 99 L62 95 L66 103 L58 107 Z" fill="#8b939b" opacity="0.18"/>

    <path
      d="M10 16
         C24 5, 45 7, 56 11
         C74 5, 99 8, 113 17"
      fill="none"
      stroke="#eef3f7"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.13"
    />
  </g>
</svg>