<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256">
  <defs>
    <!-- COLORS -->
    <linearGradient id="baseDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d848d"/>
      <stop offset="0.45" stop-color="#4e555e"/>
      <stop offset="1" stop-color="#23272d"/>
    </linearGradient>

    <linearGradient id="topDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5adb5"/>
      <stop offset="1" stop-color="#59616a"/>
    </linearGradient>

    <linearGradient id="sideDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4148"/>
      <stop offset="1" stop-color="#191c21"/>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>

    <!-- DAMAGE MASK: white = visible, black = transparent hole -->
    <mask id="damageMask1">
      <rect width="128" height="128" fill="white"/>

      <!-- edge chips -->
      <circle cx="14" cy="28" r="8" fill="black"/>
      <circle cx="111" cy="30" r="7" fill="black"/>
      <circle cx="103" cy="106" r="8" fill="black"/>

      <!-- bullet damage holes -->
      <circle cx="38" cy="52" r="5" fill="black"/>
      <ellipse cx="78" cy="66" rx="6" ry="5" fill="black"/>
      <circle cx="55" cy="95" r="5" fill="black"/>

      <!-- chipped transparent cracks -->
      <path d="M84 83 L92 87 L89 96 L81 92 Z" fill="black"/>
      <path d="M26 86 L35 83 L38 91 L28 94 Z" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#damageMask1)">
    <!-- MAIN ROCK -->
    <path
      d="M5 14
         C15 4, 34 2, 52 6
         C70 2, 101 6, 114 16
         C126 26, 128 48, 122 68
         C126 88, 114 112, 93 119
         C70 126, 38 124, 19 119
         C5 115, 0 96, 4 75
         C0 55, 1 26, 5 14Z"
      fill="url(#baseDark)"
    />

    <!-- TOP FACE -->
    <path
      d="M11 16
         C25 8, 43 8, 55 12
         C74 6, 99 9, 111 18
         C121 27, 122 45, 116 60
         C102 72, 76 78, 55 73
         C37 77, 16 71, 7 59
         C2 44, 3 27, 11 16Z"
      fill="url(#topDark)"
      filter="url(#noise)"
      opacity="0.95"
    />

    <!-- LOWER / SIDE SHADE -->
    <path
      d="M5 67
         C22 78, 42 83, 56 76
         C78 82, 101 77, 118 62
         C124 76, 122 96, 110 108
         C94 123, 58 126, 25 119
         C8 115, 0 99, 3 80
         C3 75, 4 70, 5 67Z"
      fill="url(#sideDark)"
      opacity="0.78"
    />

    <!-- LIGHT VEINS -->
    <path d="M24 30 L43 49 L34 65 L53 85" fill="none" stroke="#d7dde3" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <path d="M72 28 L92 41 L109 61" fill="none" stroke="#cfd5db" stroke-width="2.7" stroke-linecap="round" opacity="0.36"/>
    <path d="M21 61 L41 56 L59 65" fill="none" stroke="#e0e5ea" stroke-width="2.2" stroke-linecap="round" opacity="0.28"/>

    <!-- ORANGE / RUST ACCENTS -->
    <path d="M82 54 C89 48, 101 50, 106 57 C101 66, 91 70, 82 66 C78 63, 78 58, 82 54Z" fill="#b56f34" opacity="0.58"/>
    <path d="M43 92 C50 87, 60 89, 65 96 C60 104, 49 105, 43 100 C39 97, 40 94, 43 92Z" fill="#8d5829" opacity="0.42"/>

    <!-- ORIGINAL CRACKS -->
    <path d="M35 45 L54 39 L72 48" fill="none" stroke="#2a2f34" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M74 75 L86 84 L81 103" fill="none" stroke="#22262b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
    <path d="M16 95 L35 86 L45 98" fill="none" stroke="#1d2024" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

    <!-- EXTRA DAMAGE CRACKS -->
    <path d="M33 53 L45 58 L42 69" fill="none" stroke="#111418" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    <path d="M72 63 L84 69 L80 79 L89 86" fill="none" stroke="#111418" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
    <path d="M49 88 L57 95 L54 106" fill="none" stroke="#111418" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>

    <!-- IMPACT RINGS -->
    <circle cx="38" cy="52" r="7" fill="none" stroke="#1a1e23" stroke-width="2" opacity="0.45"/>
    <ellipse cx="78" cy="66" rx="8" ry="7" fill="none" stroke="#1a1e23" stroke-width="2" opacity="0.45"/>
    <circle cx="55" cy="95" r="7" fill="none" stroke="#1a1e23" stroke-width="2" opacity="0.42"/>

    <!-- SMALL TEXTURE DOTS -->
    <circle cx="27" cy="47" r="2.8" fill="#2d3137" opacity="0.35"/>
    <circle cx="64" cy="25" r="2.3" fill="#d7dde3" opacity="0.25"/>
    <circle cx="95" cy="78" r="3" fill="#16191d" opacity="0.35"/>
    <circle cx="56" cy="100" r="3.2" fill="#8b939b" opacity="0.25"/>

    <!-- EDGE HIGHLIGHT -->
    <path
      d="M10 16
         C24 5, 45 7, 56 11
         C74 5, 99 8, 113 17"
      fill="none"
      stroke="#eef3f7"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.25"
    />
  </g>
</svg>