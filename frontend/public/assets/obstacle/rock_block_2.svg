<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256">
  <defs>
    <linearGradient id="baseDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d848d"/>
      <stop offset="0.45" stop-color="#4e555e"/>
      <stop offset="1" stop-color="#23272d"/>
    </linearGradient>

    <linearGradient id="topDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5adb5"/>
      <stop offset="1" stop-color="#59616a"/>
    </linearGradient>

    <linearGradient id="sideDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b4148"/>
      <stop offset="1" stop-color="#191c21"/>
    </linearGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>

    <mask id="damageMask1">
      <rect width="128" height="128" fill="white"/>

      <!-- jagged transparent broken pieces -->
      <path d="M3 18 L15 7 L28 7 L21 18 L29 27 L14 30 L5 25 Z" fill="black"/>
      <path d="M101 7 L119 14 L124 31 L111 27 L103 38 L98 22 Z" fill="black"/>
      <path d="M106 92 L123 86 L123 111 L108 119 L99 106 Z" fill="black"/>
      <path d="M18 106 L32 99 L42 110 L30 123 L12 119 Z" fill="black"/>

      <!-- internal jagged cracks/chipped gaps -->
      <path d="M36 49 L49 43 L60 51 L51 58 L39 57 Z" fill="black"/>
      <path d="M75 64 L91 60 L98 72 L84 79 L72 73 Z" fill="black"/>
      <path d="M49 88 L62 84 L72 95 L60 105 L47 99 Z" fill="black"/>
    </mask>
  </defs>

  <g mask="url(#damageMask1)">
    <path
      d="M5 14
         C15 4, 34 2, 52 6
         C70 2, 101 6, 114 16
         C126 26, 128 48, 122 68
         C126 88, 114 112, 93 119
         C70 126, 38 124, 19 119
         C5 115, 0 96, 4 75
         C0 55, 1 26, 5 14Z"
      fill="url(#baseDark)"
    />

    <path
      d="M11 16
         C25 8, 43 8, 55 12
         C74 6, 99 9, 111 18
         C121 27, 122 45, 116 60
         C102 72, 76 78, 55 73
         C37 77, 16 71, 7 59
         C2 44, 3 27, 11 16Z"
      fill="url(#topDark)"
      filter="url(#noise)"
      opacity="0.95"
    />

    <path
      d="M5 67
         C22 78, 42 83, 56 76
         C78 82, 101 77, 118 62
         C124 76, 122 96, 110 108
         C94 123, 58 126, 25 119
         C8 115, 0 99, 3 80
         C3 75, 4 70, 5 67Z"
      fill="url(#sideDark)"
      opacity="0.78"
    />

    <!-- dark exposed broken faces -->
    <path d="M35 49 L49 42 L61 51 L51 59 L38 58 Z" fill="#12161a" opacity="0.65"/>
    <path d="M74 64 L91 59 L99 72 L84 80 L71 74 Z" fill="#111418" opacity="0.68"/>
    <path d="M48 88 L62 83 L73 95 L60 106 L46 100 Z" fill="#111418" opacity="0.64"/>

    <!-- original veins -->
    <path d="M24 30 L43 49 L34 65 L53 85" fill="none" stroke="#d7dde3" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
    <path d="M72 28 L92 41 L109 61" fill="none" stroke="#cfd5db" stroke-width="2.7" stroke-linecap="round" opacity="0.32"/>
    <path d="M21 61 L41 56 L59 65" fill="none" stroke="#e0e5ea" stroke-width="2.2" stroke-linecap="round" opacity="0.24"/>

    <!-- mineral patches -->
    <path d="M82 54 C89 48, 101 50, 106 57 C101 66, 91 70, 82 66 C78 63, 78 58, 82 54Z" fill="#b56f34" opacity="0.5"/>
    <path d="M43 92 C50 87, 60 89, 65 96 C60 104, 49 105, 43 100 C39 97, 40 94, 43 92Z" fill="#8d5829" opacity="0.38"/>

    <!-- stronger cracks -->
    <path d="M35 45 L54 39 L72 48" fill="none" stroke="#111418" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
    <path d="M74 75 L86 84 L81 103" fill="none" stroke="#111418" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.76"/>
    <path d="M16 95 L35 86 L45 98" fill="none" stroke="#111418" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>

    <path d="M32 51 L47 59 L43 72" fill="none" stroke="#0d1013" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M70 61 L86 70 L79 84 L92 95" fill="none" stroke="#0d1013" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M49 87 L62 97 L56 112" fill="none" stroke="#0d1013" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- small angular texture -->
    <path d="M27 47 L32 45 L35 50 L29 53 Z" fill="#2d3137" opacity="0.32"/>
    <path d="M63 24 L68 22 L71 27 L65 29 Z" fill="#d7dde3" opacity="0.22"/>
    <path d="M94 78 L100 76 L102 82 L96 85 Z" fill="#16191d" opacity="0.32"/>

    <path
      d="M10 16
         C24 5, 45 7, 56 11
         C74 5, 99 8, 113 17"
      fill="none"
      stroke="#eef3f7"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.2"
    />
  </g>
</svg>