<svg
  class="tank-hud"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 14 900 111"
  width="900"
  height="111"
  preserveAspectRatio="none"
>
  <defs>
    <style>
      .tank-hud {
        --hud-cyan: #00eaff;
        --hud-cyan-strong: #00fff0;
        --hud-cyan-dark: #0a4d5f;

        --hud-bg-top: #06131b;
        --hud-bg-mid: #02080d;
        --hud-bg-bottom: #000408;

        --hud-center-top: #071d29;
        --hud-center-bottom: #02070c;

        --hud-grid-color: #0c2a37;
        --hud-shadow: #000000;

        --hud-main-opacity: 0.98;
        --hud-grid-opacity: 0.32;
        --hud-line-opacity: 0.9;
      }

      .hud-neon-line {
        fill: none;
        stroke: var(--hud-cyan);
        stroke-width: 2;
        opacity: var(--hud-line-opacity);
        filter: url(#cyanGlow);
      }

      .hud-inner-line {
        fill: none;
        stroke: var(--hud-cyan-dark);
        stroke-width: 1;
        opacity: 0.9;
      }

      .hud-grid {
        fill: url(#techGrid);
        opacity: var(--hud-grid-opacity);
      }

      .hud-shadow-fill {
        fill: var(--hud-shadow);
        opacity: 0.2;
      }
    </style>

    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--hud-bg-top)" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="var(--hud-bg-mid)" stop-opacity="0.98"/>
      <stop offset="1" stop-color="var(--hud-bg-bottom)" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="centerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--hud-center-top)" stop-opacity="0.96"/>
      <stop offset="1" stop-color="var(--hud-center-bottom)" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--hud-cyan)" stop-opacity="0"/>
      <stop offset="0.18" stop-color="var(--hud-cyan)" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="var(--hud-cyan-strong)" stop-opacity="1"/>
      <stop offset="0.82" stop-color="var(--hud-cyan)" stop-opacity="0.85"/>
      <stop offset="1" stop-color="var(--hud-cyan)" stop-opacity="0"/>
    </linearGradient>

    <filter id="cyanGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="var(--hud-shadow)" flood-opacity="0.8"/>
    </filter>

    <pattern id="techGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="var(--hud-grid-color)" stroke-width="0.8" opacity="0.28"/>
    </pattern>
  </defs>

  <path
    filter="url(#softShadow)"
    d="M0 58 L220 58 L245 32 L655 32 L680 58 L900 58 L900 125 L0 125 Z"
    fill="url(#panelBg)"
  />

  <path
    d="M230 58 L255 24 L645 24 L670 58 L650 74 L250 74 Z"
    fill="url(#centerBg)"
    opacity="0.98"
  />

  <path
    class="hud-grid"
    d="M0 58 L220 58 L245 32 L655 32 L680 58 L900 58 L900 125 L0 125 Z"
  />

  <path
    class="hud-neon-line"
    d="M0 58 L220 58 L245 32 L655 32 L680 58 L900 58"
  />

  <path
    class="hud-inner-line"
    d="M8 64 L224 64 L249 38 L651 38 L676 64 L892 64"
  />

  <path
    d="M0 123 L210 123 L220 125 M680 125 L690 123 L900 123"
    fill="none"
    stroke="var(--hud-cyan)"
    stroke-width="1"
    opacity="0.28"
  />

  <path
    d="M440 32 L450 46 L460 32 Z"
    fill="#07131a"
    stroke="var(--hud-cyan)"
    stroke-width="2"
    opacity="0.95"
    filter="url(#cyanGlow)"
  />

  <rect x="18" y="90" width="180" height="2" fill="url(#cyanLine)" opacity="0.45"/>
  <rect x="702" y="90" width="180" height="2" fill="url(#cyanLine)" opacity="0.45"/>
  <rect x="300" y="108" width="300" height="1.5" fill="url(#cyanLine)" opacity="0.25"/>

  <path d="M222 58 L247 32" stroke="var(--hud-cyan)" stroke-width="1.2" opacity="0.65"/>
  <path d="M678 58 L653 32" stroke="var(--hud-cyan)" stroke-width="1.2" opacity="0.65"/>
  <path d="M246 74 L654 74" stroke="#073544" stroke-width="2" opacity="0.85"/>

  <path class="hud-shadow-fill" d="M0 58 L220 58 L245 32 L255 24 L235 70 L0 70 Z"/>
  <path class="hud-shadow-fill" d="M900 58 L680 58 L655 32 L645 24 L665 70 L900 70 Z"/>

  <g opacity="0.55">
    <circle cx="250" cy="54" r="2" fill="var(--hud-cyan)"/>
    <circle cx="650" cy="54" r="2" fill="var(--hud-cyan)"/>
    <circle cx="36" cy="104" r="1.4" fill="#0bcfe6"/>
    <circle cx="864" cy="104" r="1.4" fill="#0bcfe6"/>
  </g>
</svg>