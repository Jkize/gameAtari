services:
  postgres:
    image: postgres:17-alpine
    container_name: tank-arena-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tank_arena}
      POSTGRES_USER: ${POSTGRES_USER:-tank_arena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tank_arena}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [tank-arena]

  redis:
    image: redis:8-alpine
    container_name: tank-arena-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tank_arena}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-tank_arena}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [tank-arena]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tank-arena-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [tank-arena]

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tank-arena-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-tank_arena}
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [tank-arena]

networks:
  tank-arena:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
