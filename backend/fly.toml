# fly.toml app configuration file generated for tank-arena-backend on 2026-07-12T18:32:19-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tank-arena-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = 'npm run prisma:deploy'

[env]
  AUTH_ALLOWED_DOMAINS = 'playtankarena.com,www.playtankarena.com'
  AUTH_PRIMARY_DOMAIN = 'playtankarena.com'
  AUTH_PRIMARY_URI = 'https://playtankarena.com'
  AUTH_REFRESH_TTL_SECONDS = '604800'
  DEV_GAME_MODE = 'false'
  DEV_INFRA_OPTIONAL = 'false'
  DEV_MANUAL_START = 'false'
  FRONTEND_ORIGIN = 'https://playtankarena.com,https://www.playtankarena.com'
  NODE_ENV = 'production'
  PORT = '3000'
  REWARDS_ENABLED = 'false'
  REWARD_MAX_RETRIES = '10'
  REWARD_PROCESSOR_BATCH_SIZE = '10'
  REWARD_PROCESSOR_ENABLED = 'false'
  REWARD_PROCESSOR_INTERVAL_MS = '15000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 750
    soft_limit = 500

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'performance-1x'
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 2048
